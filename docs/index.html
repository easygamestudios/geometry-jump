<!DOCTYPE html>
<html lang="ru">
<head>

<meta property="og:title" content="Geometry Jump">

<style>
  :root {
    --bg: #0a1e64;
    --bg2: #061643;
    --ink: #ffffff;
    --dim: rgba(255, 255, 255, .62);
    --green: #57c94a;
    --green-dark: #2f8a25;
    --line: rgba(255, 255, 255, .14);
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 32px 20px;
    background: linear-gradient(170deg, var(--bg) 0%, var(--bg2) 100%);
    background-attachment: fixed;
    color: var(--ink);
    font: 16px/1.6 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    -webkit-font-smoothing: antialiased;
  }

  /* сетка на фоне — как в лобби игры */
  body::before {
    content: "";
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(var(--line) 1px, transparent 1px),
      linear-gradient(90deg, var(--line) 1px, transparent 1px);
    background-size: 90px 90px;
    mask-image: radial-gradient(ellipse at 50% 40%, #000 20%, transparent 78%);
    pointer-events: none;
  }

  main {
    position: relative;
    width: 100%;
    max-width: 560px;
    text-align: center;
  }

  .icon {
    width: 132px;
    height: 132px;
    border-radius: 29%;
    box-shadow: 0 18px 40px rgba(0, 0, 0, .45);
    image-rendering: -webkit-optimize-contrast;
  }

  h1 {
    margin: 26px 0 10px;
    font-size: clamp(38px, 9vw, 62px);
    font-weight: 900;
    letter-spacing: -.02em;
    line-height: 1.05;
    text-shadow: 0 4px 0 rgba(0, 0, 0, .35);
  }

  .tagline {
    margin: 0 0 38px;
    font-size: clamp(16px, 3.6vw, 19px);
    color: var(--dim);
  }

  /* две равноправные кнопки — обе платформы видны сразу */
  .downloads {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 16px;
  }

  .download {
    display: inline-flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    min-width: 220px;
    padding: 18px 30px;
    border-radius: 16px;
    background: var(--green);
    border-bottom: 5px solid var(--green-dark);
    color: #fff;
    text-decoration: none;
    transition: transform .12s ease, filter .12s ease;
  }

  .download .row {
    display: inline-flex;
    align-items: center;
    gap: 11px;
    font-size: 20px;
    font-weight: 800;
  }

  .download .sub {
    font-size: 12.5px;
    font-weight: 600;
    color: rgba(255, 255, 255, .8);
  }

  .download:hover { filter: brightness(1.08); }
  .download:active { transform: translateY(3px); border-bottom-width: 2px; }

  .download svg { flex: none; }

  /* подсветка кнопки под систему гостя */
  .download.you {
    box-shadow: 0 0 0 3px rgba(255, 255, 255, .35), 0 10px 26px rgba(0, 0, 0, .4);
  }
  .youtag {
    margin-top: 16px;
    font-size: 13px;
    color: var(--dim);
    min-height: 18px;
  }

  .meta {
    margin-top: 22px;
    font-size: 14px;
    color: var(--dim);
  }

  .meta b { color: rgba(255, 255, 255, .85); font-weight: 600; }

  footer {
    margin-top: 48px;
    padding-top: 22px;
    border-top: 1px solid var(--line);
    font-size: 14px;
  }

  footer a { color: var(--dim); text-decoration: none; }
  footer a:hover { color: var(--ink); }

  @media (prefers-reduced-motion: reduce) {
    .download { transition: none; }
  }
</style>
</head>
<body>
<main>
  <img class="icon" src="icon.png" alt="Иконка Geometry Jump" width="132" height="132">

  <h1>Geometry Jump</h1>
  <p class="tagline">Игра с редактором уровней для macOS и Windows</p>

  <div class="downloads">
    <a class="download" id="btn-mac" href="https://github.com/easygamestudios/geometry-jump/releases/latest/download/Geometry-Jump-arm64.dmg">

      </span>
      <span class="sub">.zip · Windows 10/11, 64-бит</span>

  </div>

<script>
  // Обе кнопки видны всегда. Систему гостя только подсвечиваем — не прячем вторую.
  var win = /Windows|Win64|Win32/i.test(navigator.userAgent || '');
  var mac = /Mac|iPhone|iPad/i.test(navigator.userAgent || '');
  var youtag = document.getElementById('youtag');
  if (win) {
    document.getElementById('btn-win').classList.add('you');

    document.getElementById('btn-mac').classList.add('you');

  }
</script>
</body>
</html>
